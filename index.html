<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foxel AR Viewer</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ececec;
            font-family: sans-serif;
        }
        /* This ensures your 3D canvas fills the screen so you can see it */
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
        }
        #ar-button {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #000000;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <model-viewer 
        src="sofa.glb" 
        poster="poster.webp"
        ar 
        ar-modes="scene-viewer webxr quick-look" 
        camera-controls 
        tone-mapping="neutral" 
        shadow-intensity="1"
        auto-rotate> <div class="progress-bar hide" slot="progress-bar">
            <div class="update-bar"></div>
        </div>
        
        <button slot="ar-button" id="ar-button">
            View in your space
        </button>
        
        <div id="ar-prompt">
            <img src="https://modelviewer.dev/shared-assets/icons/hand.png" alt="AR Guide">
        </div>
    </model-viewer>

</body>
</html>
